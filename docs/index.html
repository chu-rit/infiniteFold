<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Infinite Fold</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #faf8ef;
            color: #776e65;
            overflow: hidden;
            touch-action: none;
            padding-top: max(env(safe-area-inset-top), 44px);
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .content-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 8px 16px 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title-block {
            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            letter-spacing: 2px;
            line-height: 32px;
        }

        .title-accent {
            font-size: 48px;
            font-weight: bold;
            color: #f67c5f;
            letter-spacing: 2px;
            line-height: 32px;
        }

        .score-block {
            display: flex;
            gap: 8px;
        }

        .score-box {
            background-color: #bbada0;
            padding: 8px 14px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
            text-align: center;
        }

        .moves-box {
            background-color: #8f7a66;
        }

        .score-label {
            font-size: 10px;
            color: #eee4da;
            font-weight: 600;
            margin-bottom: 2px;
            line-height: 1.2;
        }

        .score-value {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .moves-value-warning {
            color: #ff6b6b;
        }

        .board-container {
            position: relative;
            width: min(92vw, 380px);
            height: min(92vw, 380px);
        }

        .board {
            width: 100%;
            height: 100%;
            background-color: #bbada0;
            border-radius: 12px;
            position: relative;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            padding: 12px;
        }

        .cell {
            background-color: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
            position: relative;
        }

        .tile {
            position: absolute;
            width: calc(25% - 9px);
            height: calc(25% - 9px);
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: all 0.15s ease-in-out;
        }

        .tile-2 { background-color: #eee4da; color: #776e65; }
        .tile-4 { background-color: #ede0c8; color: #776e65; }
        .tile-8 { background-color: #f2b179; color: #f9f6f2; }
        .tile-16 { background-color: #f59563; color: #f9f6f2; }
        .tile-32 { background-color: #f67c5f; color: #f9f6f2; }
        .tile-64 { background-color: #f65e3b; color: #f9f6f2; }
        .tile-128 { background-color: #edcf72; color: #f9f6f2; font-size: 20px; }
        .tile-256 { background-color: #edcc61; color: #f9f6f2; font-size: 20px; }
        .tile-512 { background-color: #edc850; color: #f9f6f2; font-size: 20px; }
        .tile-1024 { background-color: #edc53f; color: #f9f6f2; font-size: 18px; }
        .tile-2048 { background-color: #edc22e; color: #f9f6f2; font-size: 18px; }

        .star-marker {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            border-radius: 6px;
            pointer-events: none;
        }

        .star-text {
            font-size: 32px;
            color: #edc22e;
            opacity: 0.8;
        }

        .gray-star-marker {
            opacity: 0.4;
        }

        .gray-star-text {
            color: #999;
            opacity: 0.5;
        }

        .ghost {
            opacity: 0.5;
        }

        .affected {
            border: 3px solid #edc22e;
            background-color: transparent;
        }

        .fold-area-border {
            position: absolute;
            border: 3px solid #edc22e;
            border-radius: 6px;
            background-color: transparent;
            pointer-events: none;
        }

        .fold-arrow {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            color: #4ecca3;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .combo-overlay-container {
            position: absolute;
            top: 35vh;
            left: 0;
            right: 0;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        .combo-burst {
            background-color: #f67c5f;
            padding: 16px 24px;
            border-radius: 12px;
            flex-direction: row;
            align-items: center;
            gap: 12px;
        }

        .combo-burst-special {
            background-color: #e74c3c;
        }

        .combo-burst-label {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        .combo-number-row {
            flex-direction: row;
            align-items: center;
        }

        .combo-burst-number {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .combo-popup {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #f67c5f;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
            animation: comboPopup 1.2s ease-out forwards;
        }

        @keyframes comboPopup {
            0% {
                transform: translateX(-50%) scale(0.5) rotate(-10deg);
                opacity: 0;
            }
            50% {
                transform: translateX(-50%) scale(1.2) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) translateY(-30px) scale(1);
                opacity: 0;
            }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-card {
            background-color: #fff;
            padding: 32px;
            border-radius: 16px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .game-over-title {
            font-size: 28px;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 8px;
        }

        .game-over-message {
            font-size: 14px;
            color: #776e65;
            margin-bottom: 8px;
        }

        .game-over-score {
            font-size: 20px;
            font-weight: bold;
            color: #f67c5f;
            margin-bottom: 16px;
        }

        .close-button {
            background-color: #e74c3c;
            padding: 14px;
            border-radius: 8px;
            min-width: 140px;
            align-items: center;
        }

        .close-button-text {
            color: #fff;
            font-weight: bold;
            font-size: 16px;
        }

        .retry-section {
            width: 100%;
            display: flex;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .retry-button {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            background-color: #e74c3c;
            padding: 14px 28px;
            border-radius: 25px;
            gap: 8px;
        }

        .retry-icon {
            font-size: 20px;
            color: #fff;
        }

        .retry-text {
            font-size: 16px;
            color: #fff;
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-center {
            justify-content: center;
        }

        /* iOS Safari optimizations */
        @supports (-webkit-touch-callout: none) {
            .board {
                -webkit-transform: translateZ(0);
                transform: translateZ(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content-wrapper">
            <!-- Header -->
            <div class="header">
                <div class="title-block">
                    <div class="title">INFINITE</div>
                    <div class="title-accent">FOLD</div>
                </div>
                
                <div class="score-block">
                    <!-- MOVES 박스 - 유효한 접기 경우의 수 -->
                    <div class="score-box moves-box">
                        <div class="score-label">Possible<br>Moves</div>
                        <div class="score-value" id="moves-count">8</div>
                    </div>
                    <div class="score-box">
                        <div class="score-label">SCORE</div>
                        <div class="score-value" id="score">0</div>
                    </div>
                    <div class="score-box">
                        <div class="score-label">BEST</div>
                        <div class="score-value" id="best-score">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Board -->
        <div class="board-container">
            <div class="board" id="board">
                <!-- Cells will be generated by JavaScript -->
            </div>
        </div>

        <!-- Combo Overlay -->
        <div class="combo-overlay-container" id="combo-container"></div>

        <!-- Game Over Popup -->
        <div class="overlay hidden" id="game-over-overlay">
            <div class="game-over-card">
                <div class="game-over-title">DEADLOCKED</div>
                <div class="game-over-message">No more valid moves!</div>
                <div class="game-over-score" id="final-score">Final Score: 0</div>
                <div class="close-button" id="close-button">
                    <div class="close-button-text">✕ CLOSE</div>
                </div>
            </div>
        </div>

        <!-- Retry Button -->
        <div class="retry-section hidden" id="retry-section">
            <div class="retry-button" id="retry-button">
                <div class="retry-icon">↻</div>
                <div class="retry-text">TRY AGAIN</div>
            </div>
        </div>
    </div>

    <script src="src/game-logic.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
