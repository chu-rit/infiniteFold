<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Infinite Fold</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
      user-select: none !important;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #faf8ef;
      overflow: hidden;
      touch-action: none;
      -webkit-overflow-scrolling: touch;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    
    #root {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .container {
      width: 100%;
      height: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      background-color: #faf8ef;
      overflow: hidden;
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px;
      padding-top: 8px;
      padding-bottom: 12px;
    }
    
    .title-block {
      display: flex;
      flex-direction: column;
    }
    
    .title {
      font-size: 28px;
      font-weight: 900;
      color: #776e65;
      letter-spacing: 2px;
      line-height: 32px;
    }
    
    .title-accent {
      font-size: 28px;
      font-weight: 900;
      color: #f65e3b;
      letter-spacing: 2px;
      line-height: 32px;
    }
    
    .score-block {
      display: flex;
      gap: 8px;
    }
    
    .score-box {
      background-color: #bbada0;
      padding: 8px 14px;
      border-radius: 8px;
      text-align: center;
      min-width: 60px;
    }
    
    .score-label {
      font-size: 10px;
      color: #eee4da;
      font-weight: 600;
      margin-bottom: 2px;
    }
    
    .score-value {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }
    
    /* Combo Overlay */
    .combo-overlay {
      position: absolute;
      top: 35%;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      pointer-events: none;
    }
    
    .combo-burst-container {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .combo-burst {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    
    .combo-label {
      color: #fff;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    
    .combo-number-row {
      display: flex;
      align-items: flex-end;
      margin-top: -10px;
    }
    
    .combo-x {
      color: #fff;
      font-size: 40px;
      font-weight: 900;
      margin-bottom: 8px;
      margin-right: 4px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    
    .combo-number {
      color: #fff;
      font-size: 80px;
      font-weight: 900;
      line-height: 88px;
      font-style: italic;
      text-shadow: 4px 4px 6px rgba(0,0,0,0.5);
    }
    
    .combo-number.special {
      color: #ffeb3b;
      font-size: 100px;
      line-height: 110px;
      text-shadow: 4px 4px 6px rgba(231, 76, 60, 0.8);
    }
    
    /* Board Container */
    .board-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 16px;
      overflow: hidden;
    }
    
    /* Game Board */
    .game-board {
      position: relative;
      background-color: #bbada0;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .board-content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    
    .cell {
      position: absolute;
      background-color: rgba(238, 228, 218, 0.35);
      border-radius: 6px;
    }
    
    .cell.affected {
      background-color: transparent;
      border: 3px solid #edc22e;
    }
    
    .fold-area-border {
      position: absolute;
      border: 3px solid #edc22e;
      border-radius: 6px;
      background-color: transparent;
    }
    
    /* Tiles */
    .tile {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 6px;
      font-weight: bold;
      transition: transform 0.1s ease;
    }
    
    .tile-value {
      pointer-events: none;
    }
    
    .tile.ghost {
      opacity: 0.5;
    }
    
    .tile.merge {
      opacity: 0.7;
    }
    
    .tile.mismatch {
      opacity: 0.5;
      background-color: #ff4444 !important;
    }
    
    .tile-affected {
      opacity: 0.8;
    }
    
    .merge-badge {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 10px;
      color: #fff;
      font-weight: bold;
    }
    
    /* Tile Colors */
    .tile-2 { background-color: #eee4da; color: #776e65; }
    .tile-4 { background-color: #ede0c8; color: #776e65; }
    .tile-8 { background-color: #f2b179; color: #f9f6f2; }
    .tile-16 { background-color: #f59563; color: #f9f6f2; }
    .tile-32 { background-color: #f67c5f; color: #f9f6f2; }
    .tile-64 { background-color: #f65e3b; color: #f9f6f2; }
    .tile-128 { background-color: #edcf72; color: #f9f6f2; }
    .tile-256 { background-color: #edcc61; color: #f9f6f2; }
    .tile-512 { background-color: #edc850; color: #f9f6f2; }
    .tile-1024 { background-color: #edc53f; color: #f9f6f2; }
    .tile-2048 { background-color: #edc22e; color: #f9f6f2; }
    .tile-default { background-color: #3c3a32; color: #f9f6f2; }
    
    /* Arrow Overlay */
    .arrow-overlay {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }
    
    .arrow-text {
      font-size: 32px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
    
    /* Message Overlay */
    .message-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(100, 100, 100, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
    }
    
    .message-text {
      font-size: 24px;
      color: #666;
      font-weight: bold;
      background-color: rgba(255,255,255,0.9);
      padding: 10px 20px;
      border-radius: 8px;
    }
    
    /* Warning Overlay */
    .warning-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 100, 100, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
    }
    
    .warning-text {
      color: #ff4444;
      font-weight: bold;
      font-size: 24px;
      background-color: rgba(255,255,255,0.9);
      padding: 10px 20px;
      border-radius: 8px;
    }
    
    /* Overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(238, 228, 218, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    
    .game-over-card {
      background-color: #fff;
      padding: 32px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 260px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    
    .game-over-title {
      font-size: 28px;
      font-weight: bold;
      color: #e94560;
      margin-bottom: 8px;
    }
    
    .game-over-message {
      font-size: 14px;
      color: #776e65;
      margin-bottom: 8px;
    }
    
    .game-over-score {
      font-size: 20px;
      font-weight: bold;
      color: #f67c5f;
      margin-bottom: 24px;
    }
    
    .close-button {
      background-color: #8f7a66;
      padding: 14px 40px;
      border-radius: 8px;
      min-width: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .close-button-text {
      color: #fff;
      font-weight: bold;
      font-size: 16px;
    }
    
    /* Retry Bar */
    .retry-bar {
      background-color: #f65e3b;
      margin: 0 16px 16px 16px;
      padding: 14px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .retry-button-text {
      color: #fff;
      font-weight: bold;
      font-size: 18px;
    }
    
    /* Instructions */
    .instructions {
      padding: 12px 16px 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .instruction-text {
      font-size: 13px;
      color: #776e65;
      text-align: center;
      margin-bottom: 4px;
    }
    
    .tip-text {
      font-size: 12px;
      color: #f65e3b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="src/app.js?v=4"></script>
</body>
</html>
